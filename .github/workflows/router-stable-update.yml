name: 9Router Stable Update

on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/router-stable-update.yml"
      - "scripts/update-router-stable.ps1"
      - "scripts/sync-upstream.ps1"
      - "patches/router/**"
      - "packages/@zh/router/upstream/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  stable-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Update only to latest stable 9Router
        shell: pwsh
        run: ./scripts/update-router-stable.ps1 -NoDocker

      - name: Build affected packages
        run: |
          pnpm --filter @zh/sdk build
          pnpm --filter @zh/router build
          pnpm --filter @zh/brain build
          pnpm --filter @zh/hr build

      - name: Create PR
        if: success() && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "sync(upstream): 9Router stable update"
          body: |
            Automated 9Router stable update.

            This workflow only considers npm versions matching stable semver (`x.y.z`) and skips prerelease tags such as alpha, beta, rc, canary, and next.

            Review checklist:
            - Confirm `packages/@zh/router/upstream/package.json` moved to the expected stable version.
            - Confirm custom patches still apply.
            - Confirm staging workflow passes before merge.
          branch: "sync/router-stable-${{ github.run_id }}"
          commit-message: "Update 9Router to latest stable"
