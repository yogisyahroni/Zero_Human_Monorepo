name: Upstream Sync

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/upstream-sync.yml"
      - "patches/**"
      - "scripts/sync-upstream.ps1"
      - "packages/@zh/**/upstream/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        upstream:
          - { name: brain, repo: NousResearch/hermes-agent, branch: main }
          - { name: hr, repo: paperclipai/paperclip, branch: master }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "DRY_RUN: upstream sync will be tested without opening a PR." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "SYNC_RUN: upstream sync may open a PR when changes exist." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Pull upstream subtree
        run: |
          git subtree pull \
            --prefix=packages/@zh/${{ matrix.upstream.name }}/upstream \
            https://github.com/${{ matrix.upstream.repo }}.git \
            ${{ matrix.upstream.branch }} \
            --squash

      - name: Apply custom patches
        id: patches
        run: |
          failed=0
          for patch in patches/${{ matrix.upstream.name }}/*.patch; do
            [ -f "$patch" ] || continue
            if git apply "$patch"; then
              echo "APPLIED: $patch" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "PATCH_FAILED: $patch" >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Build package
        run: |
          pnpm install --frozen-lockfile=false
          pnpm --filter @zh/sdk build
          pnpm --filter @zh/${{ matrix.upstream.name }} build

      - name: Create PR
        if: success() && github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "sync(upstream): ${{ matrix.upstream.name }} update"
          body: |
            Automated upstream sync for `${{ matrix.upstream.name }}`.

            Review checklist:
            - Confirm subtree diff is expected.
            - Confirm patch queue applied cleanly.
            - Confirm adapter build passed.
            - Run Docker smoke flow before merge when upstream runtime changed.
          branch: "sync/${{ matrix.upstream.name }}-${{ github.run_id }}"
